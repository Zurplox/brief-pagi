name: Brief Pagi - Notify (08:07 SGT)

on:
  schedule:
    # 08:07 SGT (UTC+8) -> 00:07 UTC
    - cron: "7 0 * * *"
  workflow_dispatch:
    inputs:
      force_send:
        description: "Paksa kirim (1 = ya)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send brief to WhatsApp/Telegram
        env:
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
        run: python scripts/notify.py
