name: Brief Pagi - Fetch (06:52 SGT)

on:
  schedule:
    # 06:52 SGT (UTC+8) -> 22:52 UTC hari sebelumnya
    - cron: "52 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch news (RSS, no key)
        run: python scripts/fetch_news.py

      - name: Fetch markets (Yahoo, no key)
        run: python scripts/fetch_markets.py

      - name: Build brief (AI optional)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/build_brief.py

      - name: Commit brief data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          git commit -m "Brief fetch $(date -u +%Y-%m-%d)" || echo "no changes"
          git push || echo "push skipped"
