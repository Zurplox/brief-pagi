<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>📰 Brief Pagi</title>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:#faf9f7;color:#1f2328;line-height:1.55}
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px 60px}
  h1{font-size:22px;margin:0 0 2px}
  .sub{color:#6a737d;font-size:13px;margin-bottom:16px}
  .box{background:#fff;border:1px solid #e6e5e3;border-radius:12px;padding:14px 16px;margin:12px 0}
  h2{font-size:14px;margin:0 0 8px;color:#6a737d;text-transform:uppercase;letter-spacing:.04em}
  .mkt span{display:inline-block;margin:0 14px 6px 0;font-weight:600}
  .up{color:#1a7f37}.down{color:#b23c2b}
  ul{margin:0;padding-left:18px}li{margin:6px 0}
  a{color:#2E8B57;text-decoration:none}a:hover{text-decoration:underline}
  .ai{white-space:pre-wrap}
</style>
</head>
<body><div class="wrap">
  <h1>📰 Brief Pagi</h1>
  <div class="sub" id="sub">memuat…</div>
  <div class="box" id="aiBox" style="display:none"><h2>Ringkasan AI</h2><div class="ai" id="ai"></div></div>
  <div class="box"><h2>Pasar</h2><div class="mkt" id="mkt"></div></div>
  <div class="box"><h2>Berita sawit &amp; agri</h2><ul id="news"></ul></div>
</div>
<script>
fetch('data/brief.json?_='+Date.now()).then(r=>r.json()).then(b=>{
  document.getElementById('sub').textContent='Diperbarui '+(b.generated||'');
  if(b.ai_summary){document.getElementById('aiBox').style.display='';document.getElementById('ai').textContent=b.ai_summary;}
  const m=b.markets||{};let mh='';
  (m.tickers||[]).forEach(t=>{const c=(t.pct>0?'up':(t.pct<0?'down':''));
    mh+=`<span class="${c}">${t.label}: ${t.last} (${t.pct>0?'+':''}${t.pct==null?'?':t.pct}%)</span>`;});
  (m.fx||[]).forEach(f=>{mh+=`<span>${f.pair}: ${f.rate}</span>`;});
  document.getElementById('mkt').innerHTML=mh||'(tidak ada data)';
  document.getElementById('news').innerHTML=(b.news||[]).map(n=>
    `<li><a href="${n.link}" target="_blank">${n.title}</a>${n.source?' — <small>'+n.source+'</small>':''}</li>`
  ).join('')||'<li>(tidak ada berita)</li>';
}).catch(e=>{document.getElementById('sub').textContent='Gagal memuat: '+e;});
</script>
</body></html>
